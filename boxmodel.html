<html>
    <head>
        <style>
            .box1{height:300px;
                width: 300px;
                border:5px solid blue;
                padding:50px;
                margin:auto;
                box-sizing: content-box;
                box-shadow: 5px 5px 15px aqua; text-align:center;}

            .box2{height:300px;
                width: 300px;
                border:5px solid red;
                padding:110px;
                margin:10px;
                box-sizing:border-box;
                box-shadow: 5px 5px 15px crimson;}
        </style>
    </head>
    <body>
        <div class="box1">Content Box</div>
        <div class="box2">Border Box</div>
    </body>
</html>
