{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="{% static 'assets/favicon.png' %}?v=1">
  <title>Forgot Password | EdTube</title>
  <link rel="stylesheet" href="{% static "css/login.css" %}">
</head>
<body>
    {% include 'navbar.html' %}
    <div class="login-container">
        <h1 style="color: var(--text-color);">Forgot Password</h1>
        <p>Enter your email address below and we'll send you instructions to reset your password.</p>
        <form method="post">
        {% csrf_token %}
        <input type="email" name="email" placeholder="Email Address" required>
        <button type="submit" style="border-radius: 10px !important;">Send Reset Link</button>
        </form>
    </div>
</body>
</html>
