{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | EduNex</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="{% static 'footer.css' %}" />
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Lucida Sans', Geneva, Verdana, sans-serif;
      background-image: linear-gradient(to right, navy, rgb(44, 167, 50));
      overflow-x: hidden;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background-color: black;
      padding: 10px 20px;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1000;
    }

    header img {
      margin-left: -20px;
      width: 65px;
      height: 65px;
      cursor: pointer;
    }

    header h1 {
      font-size: 1.5rem;
      color: white;
      margin-left: 5px;
      cursor: pointer;
    }

    nav {
      display: flex;
      gap: 25px;
      align-items: center;
    }

    nav a {
      color: white;
      text-decoration: none;
      font-size: 1rem;
      transition: color 0.3s ease;
    }

    nav a:hover {
      color: #00c6ff;
    }

    .hamburger {
      display: none;
      flex-direction: column;
      cursor: pointer;
      gap: 5px;
    }

    .hamburger span {
      width: 25px;
      height: 3px;
      background: white;
      border-radius: 3px;
      transition: all 0.3s ease;
    }

    .mobile-nav {
      display: none;
      flex-direction: column;
      position: absolute;
      top: 75px;
      right: 20px;
      background: rgba(0, 0, 0, 0.95);
      border-radius: 8px;
      width: 200px;
      animation: fadeIn 0.3s ease-in-out;
      box-shadow: 0 0 10px rgba(0,0,0,0.4);
    }

    .mobile-nav a {
      color: white;
      padding: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      text-align: center;
      text-decoration: none;
      transition: background 0.3s ease;
    }

    .mobile-nav a:hover {
      background: rgba(255,255,255,0.1);
      color: #00c6ff;
    }

    .register-container {
      margin-top: 120px;
      background: rgba(255, 255, 255, 0.08);
      margin-left: auto;
      margin-right: auto;
      padding: 40px;
      border-radius: 15px;
      width: 75%;
      box-shadow: 0 0 25px rgba(0, 0, 0, 0.3);
      text-align: center;
      backdrop-filter: blur(6px);
      animation: fadeIn 1.2s ease-in-out;
    }

    h2 {
      margin-bottom: 10px;
      font-size: 2.3rem;
      background-image: linear-gradient(to top, white, gray);
      color: transparent;
      background-clip: text;
      -webkit-background-clip: text;
    }

    p {
      color: #cfeaff;
      font-size: 0.9rem;
      margin-bottom: 25px;
    }

    input {
      width: 100%;
      padding: 12px 15px;
      margin-bottom: 15px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      outline: none;
      transition: 0.3s;
    }

    input:focus {
      background: rgba(255, 255, 255, 0.2);
    }

    button {
      width: 40%;
      background-image: linear-gradient(to top, rgb(0, 0, 0), rgb(74, 74, 74));
      color: #fff;
      font-weight: bold;
      border: none;
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
      font-size: 1rem;
    }

    button:hover {
      transform: scale(1.1);
    }

    .social-login {
      margin: 13px 0;
      display: flex;
      justify-content: space-between;
    }

    .social-login button {
      width: 39%;
      background-image: linear-gradient(to top, rgb(0, 0, 0), rgb(74, 74, 74));
      color: #fff;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 30px;
    }

    .social-login button i {
      font-size: 1rem;
    }

    p a {
      color: #00cfff;
      text-decoration: none;
      font-weight: 500;
    }

    p a:hover {
      border-bottom: 2px solid #00cfff;
    }

    @media (max-width: 900px) {
      nav {
        display: none;
      }
      .hamburger {
        display: flex;
      }
    }
    @media (max-width: 450px){
      .register-container h2 {
        font-size: 1.3rem;
      }
      button {
        font-size: 0.6rem;
      }
      .social-login button {
        font-size: 0.6rem;
      }
    }
  </style>
</head>
<body>
  {%include 'navbar.html'%}

  <div class="register-container">
    <h2>Create Your Account</h2>
    <p>Join EduNex today and start your personalized learning journey!</p>
    <form method="POST">
      {% csrf_token %}
      <input type="text" name="fullname" placeholder="Full Name" required />
      <input type="email" name="email" placeholder="Email Address" required />
      <input type="password" name="password" placeholder="Password" required />
      <input type="password" name="confirm_password" placeholder="Confirm Password" required />
      <button type="submit">Register</button>
      {% if error %}
        <p style="color:red;">{{ error }}</p>
      {% endif %}
    </form>

    <div class="social-login">
      <button><i class="fab fa-google"></i> Google</button>
      <button><i class="fab fa-facebook-f"></i> Facebook</button>
    </div>

    <p>Already have an account? <a href="login">Login</a></p>
  </div>

  {%include 'footer.html'%}

</body>
</html>
