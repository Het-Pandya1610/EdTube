{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | EdTube</title>
  <link rel="icon" type="image/png" href="{%static 'assets/favicon.png'%}?v=1">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <script src="{%static 'js/password-toggle.js'%}"></script>
  <link rel="stylesheet" href="{% static "css/register.css" %}">
</head>
<body>
  {%include 'navbar.html'%}
  
  <div class="register-container">
    <h2>Create Your Account</h2>
    <p>Join EdTube today and start your personalized learning journey!</p>
    <form method="POST">
      {% csrf_token %}
      <input type="text" name="fullname" placeholder="Full Name" required />
      <input type="email" name="email" placeholder="Email Address" required />

      <div class="password-box">
        <input type="password" name="password" id="password" placeholder="Password" required>
        <i class="bi bi-eye toggle" style="margin-top: -6px !important;color: var(--text-color) !important;" data-target="password"></i>
      </div>

      <div class="password-box">
        <input type="password" name="confirm_password" id="confirm_password" placeholder="Confirm Password" required>
        <i class="bi bi-eye toggle" style="margin-top: -6px !important;color: var(--text-color) !important;" data-target="confirm_password"></i>
      </div>

      <select name="role" id="role" required>
        <option value="" selected hidden>Select Role</option>
        <option value="student">Student</option>
        <option value="tutor">Tutor</option>
      </select>
      <button type="submit" style="border-radius: 10px !important;margin-top: 10px;">Register</button>
      {% if error %}
        <p style="color: rgba(60, 0, 0, 1);font-size: 20px;background-color: rgba(216, 147, 147, 1);border: 2px solid red;border-radius: 10px;width: 40%;margin-left: auto;margin-right: auto;min-height: 40px;padding-top: 7px">{{ error }}</p>
      {% endif %}
    </form>

    <div class="social-login">
      <button><svg xmlns="http://www.w3.org/2000/svg" x="0px" y="0px" width="100" height="100" viewBox="0 0 48 48">
<path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"></path><path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"></path><path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"></path><path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"></path>
</svg> Sign up with Google</a></button>
    </div>

    <p>Already have an account? <a href="{%url 'login'%}">Login</a></p>
  </div>
  <script src="{% static "js/register.js" %}" defer></script>
</body>
</html>
