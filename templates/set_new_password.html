{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="{% static 'assets/favicon.png' %}?v=1">
    <title>Set New Password | EdTube</title>
    <link rel="stylesheet" href="{% static "css/register.css" %}">
    <script src="{% static "js/password-toggle.js" %}" defer></script>
    <style>
        input[name="new_password"] {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 15px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            background: var(--bg-color);
            color: var(--text-color);
            outline: none;
            transition: 0.3s;
        }
        .message {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
        }
        .message.success {
            background-color: var(--success-bg);
            color: var(--success-text);
        }
        .message.error {
            background-color: var(--error-bg);
            color: var(--error-text);
        }
    </style>
</head>
<body>
    {% include 'navbar.html' %}
    <div class="register-container">
        <h2>Set New Password</h2>
        
        {% if success %}
            <div class="message success">
                <i class="fas fa-check-circle"></i> {{ success }}
            </div>
        {% endif %}
        
        {% if error %}
            <div class="message error">
                <i class="fas fa-exclamation-circle"></i> {{ error }}
            </div>
        {% endif %}
        
        <p>Please enter your new password below.</p>
        
        <form method="POST">
            {% csrf_token %}
            <input type="hidden" name="set_new_password" value="true">
            
            <div class="password-box">
                <input type="password" name="new_password" id="password" placeholder="New Password" required>
                <i class="bi bi-eye toggle" style="margin-top: -6px !important;color: var(--text-color) !important;" data-target="password"></i>
            </div>

            

            <div class="password-box">
                <input type="password" name="confirm_password" id="confirm_password" placeholder="Confirm Password" required>
                <i class="bi bi-eye toggle" style="margin-top: -6px !important;color: var(--text-color) !important;" data-target="confirm_password"></i>
            </div>
            
            <button type="submit">Set New Password</button>
        </form>
    </div>
</body>
</html>
