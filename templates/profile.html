{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{request.user.first_name}} {{request.user.last_name}} | Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="{% static 'footer.css' %}">
  <script src="{% static 'js/theme.js' %}"></script>
  <style>
    .container{
      margin-top: 110px;
      padding: 80px 0px;
      background-color: var(--bg-color);
      backdrop-filter: blur(10px);
      border-radius: 10px;
      color: white;
      width: 90%;
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
      animation: fadeIn 1.2s ease-in-out;
    }
    .profile-header {
      display: flex;
      flex-direction: row;
      align-items: left;
      gap: 12px;
      margin-top: -40px;
      margin-left: 10px;
    }

    .profile-header img {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--text-color);
    }
    header h1{
      margin-top: auto !important;
      margin-bottom: auto
    }
    .profile-header h2 {
      color: var(--text-color);
      margin-top: 15px;
      font-size: 1.4rem;
    }

  </style>
</head>
<body>
    {%include 'navbar.html'%}
    <div id="pageContent">
        <div class="container">
            <div class="profile-header">
              <img src="{% static 'assets/default.jpg' %}" alt="Profile">
              <h2>{{ request.user.first_name }} {{ request.user.last_name }}</h2>
            </div>
        </div>
    </div>
    {%include 'footer.html'%}
</body>
