{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EdTube Reviews</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="{%static 'js/reviews.js'%}" defer></script>
  <style>
    
    h1 {
      margin-top: 120px !important;
      text-align: center;
      margin-bottom: 20px;
      color: var(--text-color) !important;
    }

    .review-container {
      max-width: 900px;
      margin: auto;
      background: rgba(255, 255, 255, 0.21);
      backdrop-filter: blur(10px);
      color: black;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    .review {
      border-bottom: 1px solid #ddd;
      padding: 15px 0;
    }

    .review:last-child {
      border-bottom: none;
    }

    .review p {
      margin: 8px 0;
    }

    .review h4 {
      margin: 0;
      font-weight: normal;
      font
      color: #fff;
    }

    .stars {
      color: gold;
      font-size: 16px;
      margin-bottom: 5px;
    }

    /* Add Review Form */
    .add-review {
      margin-top: 30px;
      padding: 20px;
      background: #eef2ff;
      border-radius: 12px;
    }

    input, textarea, select {
      width: 90%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #bbb;
      font-size: 14px;
    }
    select{
      width: 92.5%
    }
    textarea {
      max-width: 90%;
      min-height: 18px;
      height: 120px;
      resize: vertical;
    }

    .rating {
      display: flex;
      flex-direction: row-reverse;
      justify-content: left;
      gap: 5px;
      font-size: 2.5rem;
      cursor: pointer;
    }

    .rating span {
      color: #ccc;
      transition: color 0.2s;
    }

    .rating span:hover,
    .rating span:hover ~ span {
      color: gold;
    }

    .rating .selected,
    .rating .selected ~ span {
      color: gold;
    }

    button {
      padding: 10px 20px;
      background: #1e3c72;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      transition: 0.2s;
    }

    button:hover {
      background: #2a5298;
    }
    @media (max-width: 900px) {
      nav {
        display: none;
      }
      .hamburger {
        display: flex;
      }
    }
  </style>
</head>
<body>
  {%include 'navbar.html'%}
  <h1>Student Reviews</h1>

  <div class="review-container" id="reviewsList"></div>

  <div class="review-container add-review">
    <h2>Add Your Review</h2>

    <input type="text" id="nameInput" placeholder="Your Name">

    <div class="rating-container">
      <div class="rating" id="starRating">
        <span data-value="5">★</span>
        <span data-value="4">★</span>
        <span data-value="3">★</span>
        <span data-value="2">★</span>
        <span data-value="1">★</span>
      </div>
      
      <input type="hidden" id="ratingInput">
    </div>

    <textarea id="messageInput" placeholder="Write your feedback..."></textarea>

    <button>Submit Review</button>
  </div>
</body>
</html>
