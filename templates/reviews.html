{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>EduNex Reviews</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="{% static 'footer.css' %}">
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Lucida Sans', Geneva, Verdana, sans-serif;
      background-image: linear-gradient(to right, navy, rgb(44, 167, 50));
      overflow-x: hidden;
    }
    h1 {
      margin-top: 15%;
      text-align: center;
      margin-bottom: 20px;
      background-image: linear-gradient(to top, white, gray);
      color: transparent;
      background-clip: text;
      -webkit-background-clip: text;
    }

    .review-container {
      max-width: 900px;
      margin: auto;
      background: rgba(255, 255, 255, 0.21);
      backdrop-filter: blur(10px);
      color: black;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    .review {
      border-bottom: 1px solid #ddd;
      padding: 15px 0;
    }

    .review:last-child {
      border-bottom: none;
    }

    .review p {
      margin: 8px 0;
    }

    .review h4 {
      margin: 0;
      font-weight: normal;
      color: #fff;
    }

    .stars {
      color: gold;
      font-size: 16px;
      margin-bottom: 5px;
    }

    /* Add Review Form */
    .add-review {
      margin-top: 30px;
      padding: 20px;
      background: #eef2ff;
      border-radius: 12px;
    }

    input, textarea, select {
      width: 90%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      border: 1px solid #bbb;
      font-size: 14px;
    }
    select{
      width: 92.5%
    }
    textarea {
      max-width: 90%;
      min-height: 18px;
      height: 120px;
      resize: vertical;
    }

    .rating {
      display: flex;
      flex-direction: row-reverse;
      justify-content: left;
      gap: 5px;
      font-size: 2.5rem;
      cursor: pointer;
    }

    .rating span {
      color: #ccc;
      transition: color 0.2s;
    }

    .rating span:hover,
    .rating span:hover ~ span {
      color: gold;
    }

    .rating .selected,
    .rating .selected ~ span {
      color: gold;
    }

    button {
      padding: 10px 20px;
      background: #1e3c72;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      transition: 0.2s;
    }

    button:hover {
      background: #2a5298;
    }
    @media (max-width: 900px) {
      nav {
        display: none;
      }
      .hamburger {
        display: flex;
      }
    }
  </style>
</head>
<body>
  {%include 'navbar.html'%}
  <h1>Student Reviews</h1>

  <div class="review-container" id="reviewsList"></div>

  <div class="review-container add-review">
    <h2>Add Your Review</h2>

    <input type="text" id="nameInput" placeholder="Your Name">

    <div class="rating-container">
      <div class="rating" id="starRating">
        <span data-value="5">★</span>
        <span data-value="4">★</span>
        <span data-value="3">★</span>
        <span data-value="2">★</span>
        <span data-value="1">★</span>
      </div>
      
      <input type="hidden" id="ratingInput">
    </div>

    <textarea id="messageInput" placeholder="Write your feedback..."></textarea>

    <button onclick="addReview()">Submit Review</button>
  </div>
  {%include 'footer.html'%}
  <script>
    // Your exact reviews from homepage
    const defaultReviews = [
      { name: "Aarav Patel", rating: "★★★★★", message: "EduNex helped me build a consistent study habit. My scores improved faster than I expected!" },
      { name: "Meera Sharma", rating: "★★★★☆", message: "The quizzes actually adapt to your progress — it feels like having a personal tutor!" },
      { name: "Rohan Mehta", rating: "★★★★★", message: "Clean UI, smooth performance, and tracking features that keep you motivated every day." },
      { name: "Priya Nair", rating: "★★★★★", message: "One of the best educational platforms I’ve used — simple, modern, and effective." },
      { name: "Aditya Singh", rating: "★★★★☆", message: "The scheduling and reminders make studying easier and more organized than ever." },
      { name: "Diya Kapoor", rating: "★★★★★", message: "EduNex keeps learning exciting! I can track everything I do — progress feels visible." }
    ];

    // Load from localStorage OR default
    let reviews = JSON.parse(localStorage.getItem("reviews")) || defaultReviews;

    function displayReviews() {
      const container = document.getElementById("reviewsList");
      container.innerHTML = "<h2>What Students Say</h2>";

      reviews.forEach(r => {
        container.innerHTML += `
          <div class="review">
            <div class="stars">${r.rating}</div>
            <p>${r.message}</p>
            <h4>— ${r.name}</h4>
          </div>
        `;
      });

      localStorage.setItem("reviews", JSON.stringify(reviews));
    }

    function addReview() {
      const name = document.getElementById("nameInput").value.trim();
      const rating = document.getElementById("ratingInput").value;
      const message = document.getElementById("messageInput").value.trim();

      if (!name || !rating || !message) {
        alert("All fields are required.");
        return;
      }

      reviews.push({
        name,
        rating: generateStarString(rating),
        message
      });

      displayReviews();

      document.getElementById("nameInput").value = "";
      document.getElementById("ratingInput").value = "";
      document.getElementById("messageInput").value = "";
    }

    function generateStarString(rating) {
      if (rating == 5) return "★★★★★";
      if (rating == 4.5) return "★★★★\u2BEA";
      if (rating == 4) return "★★★★☆";
      return "★★★★★";
    }

    displayReviews();
  </script>
  
  <script>
    const stars = document.querySelectorAll("#starRating span");
    const ratingInput = document.getElementById("ratingInput");

    stars.forEach(star => {
      star.addEventListener("click", () => {
        const rating = star.getAttribute("data-value");
        ratingInput.value = rating;

        stars.forEach(s => s.classList.remove("selected"));
        star.classList.add("selected");
        let next = star.nextElementSibling;
        while (next) {
          next.classList.add("selected");
          next = next.nextElementSibling;
        }
      });
    });
  </script>

</body>
</html>
