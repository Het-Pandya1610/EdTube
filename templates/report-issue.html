{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Report an Issue | EdTube</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="{% static 'footer.css' %}" />
  <style>
    body {
      margin: 0;
      font-family: 'Lucida Sans', Geneva, Verdana, sans-serif;
      background: linear-gradient(to right, rgb(68, 68, 180), grey);
      color: #fff;
      line-height: 1.7;
      min-height: 100vh;
    }

    header {
      background: #000;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1000;
    }

    header h1 {
      color: #00aaff;
      font-size: 1.6rem;
      margin: 0;
    }

    header a {
      color: #fff;
      text-decoration: none;
      font-weight: 500;
      margin-right: 5%;
    }

    .hero {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(8px);
      padding: 120px 20px 40px;
      text-align: center;
    }

    .hero h2 {
      font-size: 2.4rem;
      background-image: linear-gradient(to top, white, gray);
      color: transparent;
      background-clip: text;
      -webkit-background-clip: text;
      margin-bottom: 15px;
    }

    .hero p {
      font-size: 1.1rem;
      color: #cfeaff;
      max-width: 700px;
      margin: 0 auto;
    }

    .content {
      max-width: 800px;
      margin: 40px auto;
      padding: 30px;
      background: rgba(255,255,255,0.07);
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.2);
    }

    form label {
      display: block;
      margin-top: 15px;
      background-image: linear-gradient(to top, white, gray);
      color: transparent;
      background-clip: text;
      -webkit-background-clip: text;
      font-weight: 500;
    }

    form input, form textarea {
      width: 100%;
      padding: 10px 7px;
      margin-top: 8px;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      background: rgba(255,255,255,0.1);
      color: #fff;
      outline: none;
      transition: 0.3s;
    }

    form select{
        width: 100%;
      padding: 10px 7px;
      margin-top: 8px;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      background: rgba(255,255,255,0.1);
      color: #8e8c8c;
      outline: none;
      transition: 0.3s;
    }

    form input:focus, form select:focus, form textarea:focus {
      background: rgba(255,255,255,0.2);
    }

    form textarea {
      height: 130px;
      resize: none;
    }

    .btn {
      margin-top: 25px;
      display: inline-block;
      background-image: linear-gradient(to top, rgb(0, 0, 0), rgb(74, 74, 74));
      color: #fff;
      font-weight: bold;
      padding: 12px 25px;
      border-radius: 8px;
      cursor: pointer;
      border: none;
      font-size: 1rem;
      transition: 0.7s ease-in-out;
    }

    .btn:hover {
      transform: scale(1.1);
    }

    @media (max-width: 768px) {
      .hero h2 { font-size: 2rem; }
      .content { margin: 20px; padding: 20px; }
    }
    input::placeholder {
  color: white;
}

  </style>
</head>
<body>
{%include 'navbar.html'%}

<section class="hero">
  <h2 style="color: black;">Report an Issue</h2>
  <p>Facing a problem? Let us know and we’ll take care of it. Please fill out the form below to report any technical, account, or payment issues.</p>
</section>

<div class="content">
  <form action="report_issue_submit.php" method="POST">
    <label for="name" style="color: black;">Your Name</label>
    <input type="text" id="name" name="name" placeholder="Enter your full name" required>

    <label for="email" style="color: black;">Email Address</label>
    <input type="email" id="email" name="email" placeholder="Enter your email" required>

    <label for="category" style="color: black;">Issue Category</label>
    <select id="category" name="category" required>
      <option value="" selected hidden>Select a category</option>
      <option value="bug">Bug or Technical Issue</option>
      <option value="payment">Payment Related</option>
      <option value="account">Account Access</option>
      <option value="other">Other</option>
    </select>

    <label for="description" style="color: black;">Describe the Issue</label>
    <textarea id="description" name="description"  placeholder="Please provide details..." required></textarea>

    <label for="screenshot" style="color: black;">Attach Screenshot (optional)</label>
    <input type="file" id="screenshot" name="screenshot" accept="image/*">

    <button type="submit" class="btn"><i class="fa-solid fa-paper-plane"></i> Submit Issue</button>
  </form>
</div>


</body>
</html>
