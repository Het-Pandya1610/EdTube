{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | EduNex</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <script src="{%static 'js/password-toggle.js'%}"></script>
  <link rel="stylesheet" href="{% static "css/login.css" %}">
</head>
<body>
    {%include 'navbar.html'%}
    <div class="login-container">
        <h2>Welcome Back</h2>
        <p>Login to continue your learning journey</p>
        <form method="POST">
          {%csrf_token%}
            <input type="email" name="email" placeholder="Email Address" required />
            <div class="password-box">
              <input type="password" name="password" id="password" placeholder="Password" required>
              <i class="bi bi-eye toggle" style="margin-top: -6px !important;" data-target="password" aria-label="Toggle password visibility"></i>
            </div>
            <button type="submit" style="border-radius: 20px !important;">Login</button>
            {% if error %}
              <p style="color:red;">{{ error }}</p>
            {% endif %}
        </form>

        <div class="social-login">
            <button href="/login/google"><i class="fab fa-google"></i> Google</button>
            <button><i class="fab fa-facebook-f"></i> Facebook</button>
        </div>

        <p>Don't have an account? <a href="{%url 'register'%}">Register</a></p>
    </div>
  <script>
  function togglePassword(inputId, icon) {
      const input = document.getElementById(inputId);

      if (input.type === "password") {
          input.type = "text";
          icon.classList.remove("bi-eye");
          icon.classList.add("bi-eye-slash");
      } else {
          input.type = "password";
          icon.classList.remove("bi-eye-slash");
          icon.classList.add("bi-eye");
      }
  }
  </script>
</body>
</html>
